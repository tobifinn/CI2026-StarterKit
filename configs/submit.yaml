    input_path: data/train_data/test_in_era5_region1.zarr
    output_path: data/forecasts/${exp_name}/test_era5_region1.nc
  era5_region2:
    input_path: data/train_data/test_in_era5_region2.zarr
    output_path: data/forecasts/${exp_name}/test_era5_region2.nc
  aimip_region1:
    input_path: data/train_data/test_in_aimip_region1.zarr
    output_path: data/forecasts/${exp_name}/test_aimip_region1.nc
  aimip_region2:
